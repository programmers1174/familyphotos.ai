<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>familyphotos.ai</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="toolbar">
      <label class="search-wrap">
        <span class="search-label">Search</span>
        <input
          id="search"
          type="search"
          placeholder="Search (coming soon — shows all photos for now)"
          autocomplete="off"
        />
      </label>
    </header>
    <main class="main">
      <p id="status" class="status" aria-live="polite">Loading…</p>
      <div id="grid" class="grid" hidden></div>
    </main>
    <div id="lightbox" class="lightbox" hidden role="dialog" aria-modal="true" aria-label="Full size photo">
      <button type="button" id="lightbox-close" class="lightbox-close" aria-label="Close">×</button>
      <img id="lightbox-img" class="lightbox-img" alt="" />
      <p class="lightbox-hint">Press <kbd>Esc</kbd> to close</p>
    </div>
    <script src="renderer.js"></script>
  </body>
</html>
